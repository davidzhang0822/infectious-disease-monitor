name: 传染病公文每日监测

on:
  schedule:
    # 北京时间 00:00（午夜，UTC 16:00 前一日）
    # 注：GitHub cron 有约 3 小时排队延迟，实际约北京时间 03:00 完成，早晨即可查看
    - cron: "0 16 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 运行监测
        run: python monitor.py

      - name: 生成 HTML 报告页
        run: python generate_site.py

      - name: 提交增量状态（已见记录 + 最新更新）
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/all_items.json data/latest_updates.json
          git diff --cached --quiet && echo "无状态变更，跳过提交" || ( \
            git commit -m "chore: 更新已见记录与最新更新状态" && \
            git remote set-url origin "https://x-access-token:${TOKEN}@github.com/davidzhang0822/infectious-disease-monitor.git" && \
            git pull --rebase origin main && \
            git push )

      - name: 发布到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
